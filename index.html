
<!DOCTYPE html>
<html lang><html lang="pl">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Losowanie grup – PFM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <section class="topGrid">

    <!-- LEWA -->
    <div class="controlsPanel">
      <h1>Losowanie grup – PFM</h1>

      <div class="explain">
        <p>
          Losowanie korzysta z <b>seeda</b>. Te same dane i ten sam seed zawsze dają ten sam wynik.
        </p>
        <p>
          Domyślnie dodawana jest <b>losowa sól</b>. Seed i sól są zapisane w logu (audit).
        </p>
      </div>

      <label>Seed:</label>
      <input id="seed" value="PFM-Turniej-2026">

      <label>Liczba grup:</label>
      <input id="groupCount" type="number" value="10" min="2">

      <label>Koszyki (do wklejenia z Excela):</label>
      <textarea id="input" rows="9"></textarea>

      <div class="buttons">
        <button onclick="startDraw()">Start / Reset</button>
        <button id="btnNext" onclick="nextStep()" disabled>Następny zawodnik</button>
        <button id="btnCopy" onclick="copyResultsToClipboard()" disabled>Kopiuj wyniki (Excel)</button>
      </div>

      <details>
        <summary>Opcje zaawansowane</summary>
        <label>
          <input type="checkbox" id="exactSeed">
          Użyj dokładnie seeda (audyt)
        </label>
        <div class="buttons secondary">
          <button onclick="exportTSV()" id="btnExport" disabled>Eksport TSV</button>
          <button onclick="exportLog()">Eksport logu</button>
          <button onclick="clearSaved()">Wyczyść zapis lokalny</button>
        </div>
      </details>
    </div>

    <!-- PRAWA -->
    <div class="logPanel">
      <h2>Przebieg losowania</h2>
      <div id="log" class="log"></div>

      <h3>Pula do losowania</h3>
      <div id="poolList" class="poolList"></div>
    </div>

  </section>

  <section class="tableSection">
    <h2>Wynik losowania</h2>
    <div id="tableWrap"></div>
  </section>
</div>

<script src="draw.js"></script>
</body>
</html>
