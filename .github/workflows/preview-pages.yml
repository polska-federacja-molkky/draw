name: Branch preview – GitHub Pages

on:
  push:
    branches-ignore:
      - gh-pages

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Prepare prod & test-preview
        run: |
          # kopiujemy na produkcję
          cp index.html draw.js style.css $GITHUB_WORKSPACE/
          # kopiujemy do test-preview (dla obecnej gałęzi)
          mkdir -p $GITHUB_WORKSPACE/test-preview
          cp index.html draw.js style.css $GITHUB_WORKSPACE/test-preview/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: $GITHUB_WORKSPACE
          keep_files: true
