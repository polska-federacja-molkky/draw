name: Deploy PROD – GitHub Pages
on:
  push:
    branches:
      - main
permissions:
  contents: write
concurrency:
  group: gh-pages
  cancel-in-progress: true
jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Cache-bust assets
        run: |
          V="${GITHUB_SHA::8}"
          sed -i "s#\"config.js\"#\"config.js?v=$V\"#; s#\"clubs.js\"#\"clubs.js?v=$V\"#; s#\"ranking.js\"#\"ranking.js?v=$V\"#; s#\"draw.js\"#\"draw.js?v=$V\"#; s#\"style.css\"#\"style.css?v=$V\"#" index.html
      - name: Deploy PROD to GitHub Pages (root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
