
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Losowanie grup – PFM</title>

  <!-- ✅ TO JEST KLUCZOWE -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <section class="topGrid">

    <div class="controlsPanel">
      <h1>Losowanie grup – PFM</h1>

      <div class="explain">
        <b>Jak to działa (dla 10-latka):</b>
        <ul>
          <li>Seed = hasło do losowania</li>
          <li>To samo hasło + dane = ten sam wynik</li>
          <li>Normalnie dodajemy losową „sól”, żeby było inaczej</li>
          <li>Seed i sól są w logu → da się sprawdzić uczciwość</li>
        </ul>
      </div>

      <label>Seed:</label>
      <input type="text" id="seed" value="PFM-Turniej-2026">

      <label>Liczba grup:</label>
      <input type="number" id="groupCount" value="10" min="2">

      <label>Koszyki (Excel):</label>
      <textarea id="input" rows="8"></textarea>

      <div class="buttons">
        <button onclick="startDraw()">Start</button>
        <button onclick="nextStep()" id="btnNext" disabled>Następny</button>
      </div>

      <label class="checkbox">
        <input type="checkbox" id="exactSeed">
        Użyj dokładnie seeda (audyt)
      </label>
    </div>

    <div class="logPanel">
      <h2>Przebieg losowania</h2>
      <div id="log" class="log"></div>
    </div>

  </section>

  <section class="tableSection">
    <h2>Wynik losowania</h2>
    <div id="tableWrap"></div>
  </section>

</div>

<!-- ✅ TO JEST KLUCZOWE -->
<script src="draw.js"></script>
</body>
</html>
