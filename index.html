
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Losowanie grup – Polska Federacja Mölkky</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Losowanie grup – Polska Federacja Mölkky</h1>

<p class="hint">
  Wklej dane z Excela. Format: nagłówki <b>KOSZYK X</b>, a wiersze: <b>Imię Nazwisko [TAB] Klub</b>.<br>
  Losowanie jest deterministyczne (seed) i jawne. <b>1 klik = 1 zawodnik</b>.
</p>

<div class="controls">
  <div class="field">
    <label for="seed">Seed losowania:</label>
    <input type="text" id="seed" value="PFM-Turniej-2026">
  </div>

  <div class="field">
    <label for="groupCount">Liczba grup:</label>
    <input type="number" id="groupCount" value="10" min="2" max="30">
  </div>
</div>

<label for="input">Koszyki (jeden koszyk = blok, jedna osoba = linia):</label>
<textarea id="input" rows="18"></textarea>

<div class="buttons">
  <button id="btnStart" onclick="startDraw()">Start / Reset</button>
  <button id="btnNext" onclick="nextStep()" disabled>Następny zawodnik</button>
</div>

<h2>Wynik (tabela)</h2>
<div id="tableWrap"></div>

<h2>Przebieg losowania</h2>
<div id="log" class="log"></div>

<script src="draw.js"></script>
</body>
</html>
